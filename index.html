<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic HTML Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #333;
        }
        p {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <h1>Welcome to My Basic HTML Page</h1>
    <p>This is a simple HTML template to get you started.</p>
    <p>You can edit this page and add your own content.</p>
    
    <h2>Some Basic Elements</h2>
    <ul>
        <li>This is a list item</li>
        <li>Another list item</li>
        <li>One more list item</li>
    </ul>
    
    <p>Here's a link to <a href="https://www.google.com" target="_blank">Google</a>.</p>
</body>
</html>
